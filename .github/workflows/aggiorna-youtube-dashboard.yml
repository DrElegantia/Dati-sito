name: aggiorna-youtube-dashboard

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: install dependencies
        run: pip install google-api-python-client isodate numpy

      - name: lint script syntax
        run: python -m compileall -q build_youtube_json.py

      - name: build youtube dashboard json
        env:
          YT_API_KEY: ${{ secrets.YT_API_KEY }}
          YT_DASHBOARD_PWD: ${{ secrets.YT_DASHBOARD_PWD }}
        run: python build_youtube_json.py

      - name: commit
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/youtube_dashboard.json
          git commit -m "Aggiorna YouTube dashboard JSON" || exit 0
          git fetch origin main
          git rebase origin/main
          git push
